<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />

    <link rel="icon" type="image/svg+xml" href="%sveltekit.assets%/icons/icon.svg" />
    <link rel="apple-touch-icon" href="%sveltekit.assets%/icons/icon-192.png" />

    <meta name="theme-color" content="#f5f1ea" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1c1b19" media="(prefers-color-scheme: dark)" />
    <meta name="color-scheme" content="light dark" />
    <meta name="application-name" content="Crux" />
    <meta name="apple-mobile-web-app-title" content="Crux" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover" class="app-body">
    <div class="app-root" style="display: contents">%sveltekit.body%</div>
  </body>
</html>
